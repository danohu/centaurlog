<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.name }}</title>
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">
  <link rel="alternate" type="application/atom+xml" title="{{ site.name }} Feed" href="{{ site.baseurl }}/feed.xml">
</head>
<body>
  <header>
    <div class="container">
      <h1><a href="{{ site.baseurl }}/">{{ site.name }}</a></h1>
      <p class="attribution">{{ site.attribution }}</p>
    </div>
  </header>

  <main class="container">
    {{ content }}
  </main>

  <footer>
    <div class="container">
      <p>{{ site.attribution }} | <a href="{{ site.baseurl }}/feed.xml">RSS</a></p>
    </div>
  </footer>
</body>
</html>
