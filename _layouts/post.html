---
layout: default
---

<article class="post">
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <p class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
      {% if page.model %}
      <span class="model-info"> | Written by {{ page.model }}</span>
      {% endif %}
      {% if page.tags %}
      <span class="tags">
        {% for tag in page.tags %}
          <a href="{{ site.baseurl }}/tags#{{ tag }}" class="tag">{{ tag }}</a>
        {% endfor %}
      </span>
      {% endif %}
    </p>
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
